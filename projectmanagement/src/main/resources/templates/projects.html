<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 관리 | Project Management</title>
    
    <!-- Theme script to prevent flashing -->
    <script th:src="@{/js/theme.js}"></script>
    
    <!-- Google Fonts: Outfit & Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Common CSS -->
    <link rel="stylesheet" th:href="@{/css/common.css}">

</head>
<body>

    <!-- Ambient Glow effects -->
    <div class="ambient-light-1"></div>
    <div class="ambient-light-2"></div>

    <!-- Toast Notifications Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Navigation Bar -->
    <div th:replace="~{fragments/nav :: navbar(activePage='projects')}"></div>

    <div class="dashboard-container">
        <!-- Dashboard Header -->
        <div class="dashboard-header">
            <h1 class="dashboard-title">프로젝트 관리</h1>
            <p class="dashboard-subtitle">워크스페이스의 모든 활성 프로젝트를 검색, 조회 및 분류할 수 있습니다.</p>
        </div>

        <!-- Project Management Toolbar -->
        <div class="projects-toolbar">
            <!-- Search Wrapper -->
            <div class="search-wrapper">
                <input type="text" id="projectSearch" placeholder="프로젝트명 또는 설명 검색...">
                <i class="fa-solid fa-magnifying-glass input-icon"></i>
            </div>
            
            <!-- Filters and Add Actions -->
            <div class="filter-wrapper">
                <select id="statusFilter" class="filter-select">
                    <option value="ALL">전체 상태</option>
                    <option value="ACTIVE">진행 중</option>
                    <option value="PENDING">보류 중</option>
                    <option value="COMPLETED">완료됨</option>
                </select>
                <button class="btn-primary" id="btnNewProject">
                    <i class="fa-solid fa-plus"></i>
                    <span>새 프로젝트</span>
                </button>
            </div>
        </div>

        <!-- Projects Grid -->
        <div class="projects-grid" id="projectsGrid">
            <!-- REST API 데이터를 기반으로 동적 로드됨 -->
        </div>
    </div>

    <!-- Project Create Modal -->
    <div class="modal-overlay" id="projectModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitleText">새 프로젝트 등록</h2>
                <button class="modal-close" id="modalClose"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="projectForm">
                <input type="hidden" id="modalProjectId">
                <div class="form-group-modal">
                    <label for="modalTitle">프로젝트명</label>
                    <input type="text" id="modalTitle" required placeholder="프로젝트명을 입력하세요">
                </div>
                <div class="form-group-modal">
                    <label for="modalDesc">프로젝트 설명</label>
                    <textarea id="modalDesc" placeholder="상세 설명을 입력하세요" rows="3"></textarea>
                </div>
                <div class="form-group-modal-row">
                    <div class="form-group-modal">
                        <label for="modalStartDate">시작일</label>
                        <input type="date" id="modalStartDate">
                    </div>
                    <div class="form-group-modal">
                        <label for="modalEndDate">종료일</label>
                        <input type="date" id="modalEndDate">
                    </div>
                </div>
                <div class="form-group-modal-row">
                    <div class="form-group-modal">
                        <label for="modalStatus">상태</label>
                        <select id="modalStatus" class="modal-select">
                            <option value="ACTIVE">진행 중</option>
                            <option value="PENDING">보류 중</option>
                            <option value="COMPLETED">완료됨</option>
                        </select>
                    </div>
                    <div class="form-group-modal">
                        <label for="modalProgress">진행률 (%)</label>
                        <input type="number" id="modalProgress" min="0" max="100" value="0">
                    </div>
                </div>
                <div class="form-group-modal">
                    <label for="modalMethodology">관리 방법론</label>
                    <select id="modalMethodology" class="modal-select">
                        <option value="KANBAN">Kanban (칸반 보드)</option>
                        <option value="AGILE">Agile (애자일 태스크)</option>
                        <option value="SCRUM">Scrum (스프린트 & 백로그)</option>
                        <option value="WATERFALL">Waterfall (폭포수 단계 관리)</option>
                        <option value="HYBRID">Hybrid (하이브리드 결합형)</option>
                    </select>
                </div>
                <div class="form-group-modal">
                    <label>참여 팀원 선택</label>
                    <div class="members-selection-list" id="modalMembersList">
                        <!-- 동적으로 가입 멤버 리스트가 로드됨 -->
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="btnCancel">취소</button>
                    <button type="submit" class="btn-primary" id="btnSave">저장</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Client-side Interactive Filter & API Integration Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('projectSearch');
            const statusFilter = document.getElementById('statusFilter');
            const projectsGrid = document.getElementById('projectsGrid');
            const btnNewProject = document.getElementById('btnNewProject');

            // Modal elements
            const projectModal = document.getElementById('projectModal');
            const modalClose = document.getElementById('modalClose');
            const btnCancel = document.getElementById('btnCancel');
            const projectForm = document.getElementById('projectForm');
            const modalMembersList = document.getElementById('modalMembersList');

            let allProjects = [];

            // Fetch and render projects
            async function fetchProjects() {
                try {
                    const response = await fetch('/api/projects');
                    if (!response.ok) {
                        throw new Error('프로젝트 데이터를 불러오는데 실패했습니다.');
                    }
                    allProjects = await response.json();
                    renderProjects(allProjects);
                } catch (error) {
                    console.error(error);
                    displayToast('프로젝트 데이터를 불러오는 도중 오류가 발생했습니다.', 'error');
                }
            }

            // Calculate D-Day
            function calculateDDay(status, endDateStr) {
                if (status === 'COMPLETED') {
                    return '<span class="project-date"><i class="fa-regular fa-calendar-check"></i> 완료</span>';
                }
                if (status === 'PENDING') {
                    return '<span class="project-date"><i class="fa-regular fa-calendar"></i> -</span>';
                }
                if (!endDateStr) {
                    return '<span class="project-date"><i class="fa-regular fa-calendar"></i> -</span>';
                }

                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const endDate = new Date(endDateStr);
                endDate.setHours(0, 0, 0, 0);

                const diffTime = endDate - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays > 0) {
                    return `<span class="project-date"><i class="fa-regular fa-calendar"></i> D-${diffDays}</span>`;
                } else if (diffDays === 0) {
                    return `<span class="project-date"><i class="fa-regular fa-calendar"></i> D-Day</span>`;
                } else {
                    return `<span class="project-date"><i class="fa-regular fa-calendar"></i> 마감(D+${Math.abs(diffDays)})</span>`;
                }
            }

            // Get initials from nickname
            function getInitials(nickname) {
                if (!nickname) return '??';
                const cleanName = nickname.trim();
                const parts = cleanName.split(' ');
                
                // 영문 이름 (예: John Doe)
                if (parts.length > 1) {
                    return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
                }
                
                // 한글 이름 혹은 단일 영어단어
                if (cleanName.length >= 2) {
                    const isKorean = /^[가-힣]+$/.test(cleanName);
                    return isKorean ? cleanName.substring(cleanName.length - 2) : cleanName.substring(0, 2).toUpperCase();
                }
                
                return cleanName.substring(0, 2).toUpperCase();
            }

            // Get avatar class based on nickname hashing
            function getAvatarClass(nickname) {
                if (!nickname) return 't1';
                let hash = 0;
                for (let i = 0; i < nickname.length; i++) {
                    hash = nickname.charCodeAt(i) + ((hash << 5) - hash);
                }
                const index = Math.abs(hash % 4) + 1; // t1, t2, t3, t4
                return `t${index}`;
            }

            // Render project cards
            function renderProjects(projects) {
                projectsGrid.innerHTML = '';
                
                if (projects.length === 0) {
                    projectsGrid.innerHTML = `
                        <div class="no-projects-message">
                            등록된 프로젝트가 없습니다.
                        </div>
                    `;
                    return;
                }

                projects.forEach(project => {
                    const dDayHtml = calculateDDay(project.status, project.endDate);
                    
                    let statusText = '진행 중';
                    let statusClass = 'status-active';
                    if (project.status === 'PENDING') {
                        statusText = '보류 중';
                        statusClass = 'status-pending';
                    } else if (project.status === 'COMPLETED') {
                        statusText = '완료됨';
                        statusClass = 'status-completed';
                    }

                    let methodologyText = '칸반';
                    let methodologyClass = 'meth-kanban';
                    if (project.methodology === 'AGILE') {
                        methodologyText = '애자일';
                        methodologyClass = 'meth-agile';
                    } else if (project.methodology === 'SCRUM') {
                        methodologyText = '스크럼';
                        methodologyClass = 'meth-scrum';
                    } else if (project.methodology === 'WATERFALL') {
                        methodologyText = '폭포수';
                        methodologyClass = 'meth-waterfall';
                    } else if (project.methodology === 'HYBRID') {
                        methodologyText = '하이브리드';
                        methodologyClass = 'meth-hybrid';
                    }

                    const barBg = project.status === 'COMPLETED' ? 'background: var(--success);' : '';

                    let dateRangeText = '';
                    if (project.startDate && project.endDate) {
                        const start = project.startDate.replace(/-/g, '.');
                        const end = project.endDate.replace(/-/g, '.');
                        dateRangeText = `${start} ~ ${end}`;
                    } else if (project.endDate) {
                        const end = project.endDate.replace(/-/g, '.');
                        dateRangeText = `~ ${end}`;
                    } else {
                        dateRangeText = '기간 미정';
                    }

                    if (project.status === 'COMPLETED' && project.endDate) {
                        dateRangeText = `${project.endDate.replace(/-/g, '.')} 완료`;
                    }

                    const membersHtml = project.members.map(member => {
                        const avatarClass = getAvatarClass(member.nickname);
                        const initials = getInitials(member.nickname);
                        return `
                            <div class="member-chip" title="${member.nickname} (${member.email})">
                                <div class="member-chip-avatar ${avatarClass}">${escapeHtml(initials)}</div>
                                <span class="member-chip-name">${escapeHtml(member.nickname)}</span>
                            </div>
                        `;
                    }).join('');

                    const createdAtDate = new Date(project.createdAt);
                    const formattedCreatedAt = isNaN(createdAtDate.getTime()) ? '-' : `${createdAtDate.getFullYear()}.${String(createdAtDate.getMonth() + 1).padStart(2, '0')}.${String(createdAtDate.getDate()).padStart(2, '0')}`;
                    const creatorNickname = project.creator ? project.creator.nickname : '알 수 없음';
                    const creatorEmail = project.creator ? project.creator.email : '';

                    const card = document.createElement('div');
                    card.className = 'project-card';
                    card.setAttribute('data-status', project.status);
                    card.setAttribute('data-title', project.title.toLowerCase());
                    card.setAttribute('data-desc', (project.description || '').toLowerCase());
                    
                    card.innerHTML = `
                        <div class="project-card-header">
                            <div class="header-badges">
                                <span class="project-status ${statusClass}">${statusText}</span>
                                <span class="project-methodology ${methodologyClass}">${methodologyText}</span>
                            </div>
                            <div class="project-card-actions">
                                ${dDayHtml}
                                <button class="btn-card-action btn-edit" title="수정" data-id="${project.id}">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <button class="btn-card-action btn-delete" title="삭제" data-id="${project.id}">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </div>
                        <h3 class="project-card-title">${escapeHtml(project.title)}</h3>
                        <p class="project-card-desc">${escapeHtml(project.description || '')}</p>
                        
                        <div class="project-meta-row">
                            <span class="project-meta-item" title="생성자: ${escapeHtml(creatorNickname)} (${escapeHtml(creatorEmail)})">
                                <i class="fa-solid fa-user-pen"></i> ${escapeHtml(creatorNickname)}
                            </span>
                            <span class="project-meta-item">
                                <i class="fa-solid fa-clock"></i> ${formattedCreatedAt}
                            </span>
                        </div>

                        <div class="project-progress-wrapper">
                            <div class="progress-info">
                                <span>진행률</span>
                                <span>${project.progress}%</span>
                            </div>
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" style="width: ${project.progress}%; ${barBg}"></div>
                            </div>
                        </div>
                        <div class="project-card-footer">
                            <div class="project-team">
                                ${membersHtml}
                            </div>
                            <span class="project-date">${dateRangeText}</span>
                        </div>
                    `;

                    projectsGrid.appendChild(card);
                });
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/&/g, '&amp;')
                          .replace(/</g, '&lt;')
                          .replace(/>/g, '&gt;')
                          .replace(/"/g, '&quot;')
                          .replace(/'/g, '&#039;');
            }

            function filterProjects() {
                const query = searchInput.value.toLowerCase().trim();
                const filterValue = statusFilter.value;
                const cards = projectsGrid.querySelectorAll('.project-card');

                cards.forEach(card => {
                    const title = card.getAttribute('data-title');
                    const desc = card.getAttribute('data-desc');
                    const status = card.getAttribute('data-status');

                    const matchesSearch = title.includes(query) || desc.includes(query);
                    const matchesStatus = filterValue === 'ALL' || status === filterValue;

                    if (matchesSearch && matchesStatus) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });
            }

            searchInput.addEventListener('input', filterProjects);
            statusFilter.addEventListener('change', filterProjects);

            function displayToast(message, type = 'success') {
                const container = document.getElementById('toastContainer');
                if (container) {
                    const toast = document.createElement('div');
                    toast.className = `toast ${type}`;
                    const icon = type === 'success' 
                        ? '<i class="fa-solid fa-circle-check"></i>' 
                        : '<i class="fa-solid fa-triangle-exclamation"></i>';
                    toast.innerHTML = `${icon}<span>${message}</span>`;
                    container.appendChild(toast);
                    setTimeout(() => toast.classList.add('show'), 10);
                    setTimeout(() => {
                        toast.classList.remove('show');
                        setTimeout(() => toast.remove(), 400);
                    }, 3000);
                }
            }

            // Modal Control Actions
            // Modal Control Actions
            function openModal(selectedMemberIds = []) {
                projectModal.style.display = 'flex';
                setTimeout(() => projectModal.classList.add('show'), 10);
                loadMembersSelection(selectedMemberIds);
            }

            function closeModal() {
                projectModal.classList.remove('show');
                setTimeout(() => {
                    projectModal.style.display = 'none';
                    projectForm.reset();
                    document.getElementById('modalProjectId').value = '';
                    modalMembersList.innerHTML = '';
                }, 250);
            }

            if (btnNewProject) {
                btnNewProject.addEventListener('click', () => {
                    document.getElementById('modalTitleText').textContent = '새 프로젝트 등록';
                    document.getElementById('modalProjectId').value = '';
                    projectForm.reset();
                    openModal();
                });
            }
            if (modalClose) {
                modalClose.addEventListener('click', closeModal);
            }
            if (btnCancel) {
                btnCancel.addEventListener('click', closeModal);
            }

            window.addEventListener('click', (e) => {
                if (e.target === projectModal) {
                    closeModal();
                }
            });

            // Get cookie by name helper
            function getCookie(name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
                return null;
            }

            // Fetch and build member check list
            async function loadMembersSelection(selectedMemberIds = []) {
                try {
                    const response = await fetch('/api/members');
                    if (!response.ok) throw new Error('회원 목록 조회 실패');
                    const members = await response.json();
                    
                    modalMembersList.innerHTML = '';
                    if (members.length === 0) {
                        modalMembersList.innerHTML = '<div class="modal-info-text text-muted">등록된 회원이 없습니다.</div>';
                        return;
                    }

                    members.forEach(member => {
                        const isChecked = selectedMemberIds.includes(member.id) ? 'checked' : '';
                        const label = document.createElement('label');
                        label.className = 'member-checkbox-item';
                        label.innerHTML = `
                            <input type="checkbox" name="projectMembers" value="${member.id}" ${isChecked}>
                            <span>${escapeHtml(member.nickname)} (${escapeHtml(member.email)})</span>
                        `;
                        modalMembersList.appendChild(label);
                    });
                } catch (error) {
                    console.error(error);
                    modalMembersList.innerHTML = '<div class="modal-info-text text-error">회원 목록을 불러오지 못했습니다.</div>';
                }
            }

            // Edit project
            function editProject(projectId) {
                const project = allProjects.find(p => p.id === projectId);
                if (!project) return;

                document.getElementById('modalTitleText').textContent = '프로젝트 수정';
                document.getElementById('modalProjectId').value = project.id;
                document.getElementById('modalTitle').value = project.title;
                document.getElementById('modalDesc').value = project.description || '';
                document.getElementById('modalStartDate').value = project.startDate || '';
                document.getElementById('modalEndDate').value = project.endDate || '';
                document.getElementById('modalStatus').value = project.status;
                document.getElementById('modalMethodology').value = project.methodology || 'KANBAN';
                document.getElementById('modalProgress').value = project.progress;

                const memberIds = project.members.map(m => m.id);
                openModal(memberIds);
            }

            // Delete project
            async function deleteProject(projectId) {
                if (confirm('정말로 이 프로젝트를 삭제하시겠습니까?')) {
                    try {
                        const response = await fetch(`/api/projects/${projectId}`, {
                            method: 'DELETE'
                        });
                        if (!response.ok) {
                            throw new Error('프로젝트 삭제에 실패했습니다.');
                        }
                        displayToast('프로젝트가 성공적으로 삭제되었습니다.', 'success');
                        fetchProjects();
                    } catch (error) {
                        console.error(error);
                        displayToast('프로젝트 삭제 도중 오류가 발생했습니다.', 'error');
                    }
                }
            }

            // Event delegation for edit and delete buttons in projectsGrid
            if (projectsGrid) {
                projectsGrid.addEventListener('click', (e) => {
                    const editBtn = e.target.closest('.btn-edit');
                    const deleteBtn = e.target.closest('.btn-delete');

                    if (editBtn) {
                        const id = parseInt(editBtn.getAttribute('data-id'), 10);
                        editProject(id);
                    } else if (deleteBtn) {
                        const id = parseInt(deleteBtn.getAttribute('data-id'), 10);
                        deleteProject(id);
                    } else {
                        const card = e.target.closest('.project-card');
                        if (card) {
                            const editBtnInCard = card.querySelector('.btn-edit');
                            if (editBtnInCard) {
                                const id = editBtnInCard.getAttribute('data-id');
                                window.location.href = `/projects/${id}`;
                            }
                        }
                    }
                });
            }

            // Save project form submission (Create or Update)
            projectForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const id = document.getElementById('modalProjectId').value;
                const title = document.getElementById('modalTitle').value.trim();
                const description = document.getElementById('modalDesc').value.trim();
                const startDate = document.getElementById('modalStartDate').value || null;
                const endDate = document.getElementById('modalEndDate').value || null;
                const status = document.getElementById('modalStatus').value;
                const methodology = document.getElementById('modalMethodology').value;
                const progress = parseInt(document.getElementById('modalProgress').value, 10) || 0;

                const selectedCheckboxes = modalMembersList.querySelectorAll('input[name="projectMembers"]:checked');
                const memberIds = Array.from(selectedCheckboxes).map(cb => parseInt(cb.value, 10));

                const requestPayload = {
                    title,
                    description,
                    startDate,
                    endDate,
                    status,
                    methodology,
                    progress,
                    memberIds
                };

                try {
                    let url = '/api/projects';
                    let method = 'POST';
                    if (id) {
                        url = `/api/projects/${id}`;
                        method = 'PUT';
                    }

                    const response = await fetch(url, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(requestPayload)
                    });

                    if (!response.ok) {
                        throw new Error('프로젝트 저장에 실패했습니다.');
                    }

                    const successMessage = id 
                        ? '프로젝트가 성공적으로 수정되었습니다.' 
                        : '새 프로젝트가 성공적으로 등록되었습니다.';
                    displayToast(successMessage, 'success');
                    closeModal();
                    fetchProjects();
                } catch (error) {
                    console.error(error);
                    displayToast('프로젝트 저장에 실패했습니다. 입력값을 확인해주세요.', 'error');
                }
            });

            // Initial load
            fetchProjects();
        });
    </script>

    <!-- Shared dashboard authentication and navbar JS -->
    <script th:src="@{/js/dashboard.js}"></script>
</body>
</html>

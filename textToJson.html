<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium JSON Formatter & Beautifier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --error: #ef4444;
            --accent: #8b5cf6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 2rem 1rem;
            text-align: center;
            background: linear-gradient(to bottom, rgba(99, 102, 241, 0.1), transparent);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1rem;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0 2rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            gap: 1.5rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(99, 102, 241, 0.23);
        }

        .btn-secondary {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background-color: var(--border);
            transform: translateY(-2px);
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            flex: 1;
            min-height: 500px;
        }

        @media (max-width: 900px) {
            .editor-container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transition: border-color 0.3s ease;
        }

        .panel:focus-within {
            border-color: var(--primary);
        }

        .panel-header {
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(15, 23, 42, 0.3);
        }

        .panel-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
        }

        textarea, pre {
            flex: 1;
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 1.25rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            outline: none;
            resize: none;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
        }

        .json-key { color: #818cf8; }
        .json-string { color: #34d399; }
        .json-number { color: #fbbf24; }
        .json-boolean { color: #f472b6; }
        .json-null { color: #94a3b8; }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateY(200%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
        }

        .toast-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .toast-success .toast-icon { background-color: var(--success); color: white; }
        .toast-error .toast-icon { background-color: var(--error); color: white; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .badge {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 1rem;
            background: var(--primary);
            color: white;
            font-weight: 700;
        }

        .action-icon {
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .action-icon:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <header>
        <h1>JSON Beautifier</h1>
        <p class="subtitle">Format, validate and prettify your JSON data with ease.</p>
    </header>

    <main>
        <div class="controls">
            <button class="btn-primary" id="formatBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></button>
                Format JSON
            </button>
            <button class="btn-secondary" id="clearBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></button>
                Clear
            </button>
        </div>

        <div class="editor-container">
            <!-- Input Panel -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Input</span>
                    <span class="badge">Raw</span>
                </div>
                <textarea id="jsonInput" placeholder="Paste your messy JSON here..."></textarea>
            </div>

            <!-- Output Panel -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Output</span>
                    <div style="display: flex; gap: 1rem; align-items: center;">
                        <svg id="copyBtn" class="action-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        <span class="badge" style="background: var(--accent);">Formatted</span>
                    </div>
                </div>
                <pre id="jsonOutput" class="json-output"></pre>
            </div>
        </div>
    </main>

    <div id="toast" class="toast">
        <div class="toast-icon">✓</div>
        <span id="toastMessage">Copied to clipboard!</span>
    </div>

    <script>
        const jsonInput = document.getElementById('jsonInput');
        const jsonOutput = document.getElementById('jsonOutput');
        const formatBtn = document.getElementById('formatBtn');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        function showToast(message, type = 'success') {
            toastMessage.textContent = message;
            toast.className = `toast show toast-${type}`;
            toast.querySelector('.toast-icon').textContent = type === 'success' ? '✓' : '✕';
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function syntaxHighlight(json) {
            if (typeof json !== 'string') {
                json = JSON.stringify(json, undefined, 2);
            }
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        function formatJSON() {
            let val = jsonInput.value.trim();
            if (!val) return;

            // Handle potential semicolon at the end
            if (val.endsWith(';')) {
                val = val.slice(0, -1).trim();
            }

            try {
                // Try to parse as JSON or JS object
                // Using Function instead of eval for slightly safer but flexible parsing
                // to handle cases where keys might not be quoted (JS objects)
                let parsed;
                try {
                    parsed = JSON.parse(val);
                } catch (e) {
                    // If JSON.parse fails, try to see if it's a JS object array
                    parsed = (new Function(`return ${val}`))();
                }

                const formatted = JSON.stringify(parsed, null, 2);
                jsonOutput.innerHTML = syntaxHighlight(formatted);
            } catch (err) {
                jsonOutput.innerHTML = `<span style="color: var(--error)">Error: Invalid JSON/Object format.\n\n${err.message}</span>`;
                showToast("Invalid format", "error");
            }
        }

        formatBtn.addEventListener('click', () => {
            formatBtn.style.transform = "scale(0.95)";
            setTimeout(() => formatBtn.style.transform = "", 100);
            formatJSON();
        });

        clearBtn.addEventListener('click', () => {
            jsonInput.value = '';
            jsonOutput.innerHTML = '';
            showToast("Cleared!");
        });

        copyBtn.addEventListener('click', () => {
            const text = jsonOutput.innerText;
            if (!text) return;
            
            navigator.clipboard.writeText(text).then(() => {
                showToast("Copied to clipboard!");
            });
        });

        // Add some sample data if empty
        window.onload = () => {
            if (!jsonInput.value) {
                jsonInput.value = '[{"id":1,"name":"JSON Tool","active":true},{"id":2,"name":"Premium UI","active":false}]';
                formatJSON();
            }
        };

        // Shortcut for Ctrl+Enter
        jsonInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                formatJSON();
            }
        });
    </script>
</body>
</html>

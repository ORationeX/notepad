<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Multi-Log Splitter (80MB)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; line-height: 1.6; max-space: 800px; margin: auto; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border: 2px dashed #007BFF; }
        #status { margin-top: 25px; padding: 15px; background: #e9ecef; border-radius: 8px; min-height: 50px; white-space: pre-wrap; font-size: 0.9em; color: #333; }
        button { background: #007BFF; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .file-info { margin-bottom: 15px; font-weight: bold; color: #007BFF; }
    </style>
</head>
<body>
    <h2>로그 파일 일괄 분할기 (80MB 단위)</h2>
    <p>여러 파일을 한 번에 선택하면 순서대로 줄 바꿈을 유지하며 분할합니다.</p>
    
    <div class="container">
        <input type="file" id="fileInput" multiple /><br><br>
        <button id="splitBtn" disabled>모든 파일 분할 시작</button>
    </div>

    <div id="status">파일을 선택해 주세요.</div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const splitBtn = document.getElementById('splitBtn');
        const status = document.getElementById('status');

        const MAX_SIZE = 80 * 1024 * 1024; // 80MB

        fileInput.onchange = () => {
            const count = fileInput.files.length;
            if (count > 0) {
                splitBtn.disabled = false;
                status.textContent = `${count}개의 파일이 선택되었습니다.`;
            }
        };

        splitBtn.onclick = async () => {
            const files = fileInput.files;
            if (files.length === 0) return;

            splitBtn.disabled = true;
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                status.textContent = `[${i + 1}/${files.length}] "${file.name}" 처리 중...\n이 과정은 파일 크기에 따라 시간이 걸릴 수 있습니다.`;
                
                await processFile(file);
            }

            status.textContent = `✅ 모든 파일(${files.length}개)의 처리가 완료되었습니다!`;
            splitBtn.disabled = false;
            fileInput.value = ""; // 초기화
        };

        async function processFile(file) {
            const reader = file.stream().getReader();
            const decoder = new TextDecoder();
            
            let partCount = 1;
            let currentBlobParts = [];
            let currentSize = 0;
            let leftover = ""; 

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                let chunk = decoder.decode(value, { stream: true });
                let lines = (leftover + chunk).split('\n');
                leftover = lines.pop();

                for (let line of lines) {
                    let lineWithBreak = line + '\n';
                    let lineSize = new Blob([lineWithBreak]).size;

                    if (currentSize + lineSize > MAX_SIZE && currentBlobParts.length > 0) {
                        saveFile(new Blob(currentBlobParts), file.name, partCount++);
                        currentBlobParts = [];
                        currentSize = 0;
                        // 브라우저 UI 업데이트 및 다운로드 간격 확보를 위한 미세 지연
                        await new Promise(resolve => setTimeout(resolve, 50)); 
                    }
                    
                    currentBlobParts.push(lineWithBreak);
                    currentSize += lineSize;
                }
            }

            // 남은 마지막 부분 처리
            if (leftover || currentBlobParts.length > 0) {
                if (leftover) currentBlobParts.push(leftover);
                saveFile(new Blob(currentBlobParts), file.name, partCount);
            }
        }

        function saveFile(blob, originalName, index) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            
            // 파일명 처리 (확장자 유지)
            const lastDotIndex = originalName.lastIndexOf('.');
            const baseName = lastDotIndex !== -1 ? originalName.substring(0, lastDotIndex) : originalName;
            const extension = lastDotIndex !== -1 ? originalName.substring(lastDotIndex) : '.log';
            
            a.href = url;
            a.download = `${baseName}_part${index}${extension}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            // 메모리 해제
            setTimeout(() => URL.revokeObjectURL(url), 10000);
        }
    </script>
</body>
</html>
